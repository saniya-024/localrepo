<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted House</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <style>
        .card {

            background-color: whitesmoke;
            width: 400px;
            height: 350px;
            border: 1px solid black;
            margin-left: 310px;
            margin-top: 100px;
            /* box-shadow: brown; */
            border-radius: 10px;


        }

        .image img {
            width: 400px;
            height: 350px;
            padding-top: 10px;

            /* padding-left:200px; */


        }

        .txt {
            color: rgba(162, 151, 151, 0.89);
        }

        .para {
            font-size: xx-large;
        }

        .txt2 {
            color: rgba(162, 151, 151, 0.89);
        }

        .main {
            display: flex;
            justify-content: space-between;
        }

        .room {
            display: flex;
        }

        .bath {
            display: flex;
            /* padding-bottom: 200px; */
        }

        .all {
            padding-bottom: 20px;
        }

        .last {
            display: flex;
            gap: 200px;
            background-color: grey;


        }

        .flex {
            display: flex;
            padding: 5px;
        }

        .p {
            font-weight: 400px;


        }


        .foot {
            padding-top: 2px;
        }
    </style>



</head>

<body>
    <div class="card">
        <div class="image">

            <img src="https://tse1.mm.bing.net/th/id/OIP.9CMc0DNud5OP62GrKj3iWAHaFh?pid=Api&rs=1&c=1&qlt=95&w=145&h=108"
                class="card-img-top" alt="Haunted House" width="100%;"">
  </div>
  <div class=" text">
            <h2 class="txt">HAUNTED HOUSE: 10Y OLD </h2>
            <p class="para">RS. 1,20,99,999 ONLY</p>
            <h3 class="txt2">303 Bhooto ki Ghati</h3>
        </div>
        <hr>


        <div class="flex">
            <div class="flex">
                <div><i class="fa-solid fa-bed"></i></div>
                <div class="p">3</div>
                <div>Badroom</div>
            </div>
            <div class="flex">
                <div><i class="fa-solid fa-bath"></i></div>
                <div class="p">2</div>
                <div>Bathroom </div>
            </div>

        </div>
        <hr>


        <div class="last">
            <span class="footer">
                <h3>RETAILER</h3>
                <i class="fa-brands fa-buy-n-large"></i>
            </span>
            <div class="foot">
                <p>Witcher:Geralt Of Rivia</p>
                <p>+91-9874563210</p>
            </div>
        </div>

    </div>
</body>

</html>
